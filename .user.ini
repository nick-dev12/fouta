; Réglages PHP appliqués quand PHP tourne en PHP-FPM / CGI (cas de Webuzo sur le VPS).
; Remplace les directives php_value qui ne fonctionnent qu'en mod_php (.htaccess).
;
; IMPORTANT : ne pas utiliser auto_prepend_file avec un chemin relatif.
; Sur les URLs /boutique/… et /user/… le CWD PHP n'est plus la racine :
; Failed opening required 'includes/session_bootstrap_prepend.php'
; La config session est déjà faite via includes/session_user.php
; + session_start_persistent() sur chaque page.
session.gc_maxlifetime = 315360000
session.cookie_lifetime = 315360000
auto_prepend_file =
upload_max_filesize = 1000M
post_max_size = 1000M
max_execution_time = 300
max_input_time = 300
memory_limit = 512M
